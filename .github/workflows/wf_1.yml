# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "master" branch
  push:
    branches: [ "master" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      issues: write
      actions: write

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6

      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo Hello, world!

      # Runs a set of commands using the runners shell
      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.

      - name: Get image version
        id: get_image_version
        run: echo "image_version=$(cat .version)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: vlalex/testapp
          labels: |
            org.opencontainers.image.version: ${{steps.get_image_version.outputs.image_version}}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}},value=${{ steps.get_image_version.outputs.image_version }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Checkout Target Repository
        uses: actions/checkout@v6
        with:
          repository: ProcopVladimirAlexandru/homelab-gitops
          path: infrastructure
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update Image Version in the related Kustomize values.yaml
        uses: fjogeleit/yaml-update-action@main
        with:
          valueFile: 'apps/overlays/homelab-dev/testapp/version.yaml'
          propertyPath: 'spec.template.spec.containers[0].image'
          value: ${{ steps.meta.outputs.tags }}
          repository: ProcopVladimirAlexandru/homelab-gitops
          branch: deployment/${{ steps.get_image_version.outputs.image_version }}
          targetBranch: master
          createPR: true
          message: 'Update Image Version to ${{ steps.get_image_version.outputs.image_version }}'
          token: ${{ secrets.TEST_DEPLOYMENT_ACTIONS_SECRET }}
          workDir: infrastructure
